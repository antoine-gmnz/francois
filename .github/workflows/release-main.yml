name: release-main

# Continuous delivery: every push to main runs the test suite, then — only if it
# passes — builds installers for Windows, macOS (universal) and Linux and publishes
# them to a single rolling "dev" pre-release that always tracks the latest main.
#
# Stable, versioned releases are cut separately by release.yml on a v* tag.
on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write # publish the release + move the dev tag

jobs:
  # Test gate + reset the rolling dev release. Runs once (a failure here stops the
  # matrix, so nothing is published). cargo test also proves the crate compiles on Linux.
  prepare:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Frontend typecheck + build
        run: npm run build
      - name: Frontend tests
        run: npm test
      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
      - name: Remove the previous dev release + tag
        run: gh release delete dev --yes --cleanup-tag
        continue-on-error: true # no-op on the very first run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal .dmg (Apple Silicon + Intel)
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04 # .AppImage + .deb
            args: ''
            rust-targets: ''
          - platform: windows-latest # .exe (NSIS) + .msi (WiX)
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build installers + publish to the dev pre-release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: dev
          releaseName: 'Development build — latest main'
          prerelease: true
          releaseDraft: false
          # dev-channel identity (Francois Dev / com.francois.dev): separate app +
          # separate data dir, so it installs and runs SIDE-BY-SIDE with a stable
          # Francois instead of replacing it. Stable (release.yml) uses the base config.
          args: ${{ matrix.args }} --config src-tauri/tauri.dev.conf.json
          releaseBody: |
            Auto-built from `main` (${{ github.sha }}) — bleeding edge, may be unstable.

            Installs as **Francois Dev** — a separate app with its own data, safe to run
            side-by-side with a stable Francois.

            - **Windows**: `Francois Dev_*_x64-setup.exe` (NSIS) or `*_x64_en-US.msi` (WiX)
            - **macOS**: `Francois Dev_*_universal.dmg` (Apple Silicon + Intel)
            - **Linux**: `Francois Dev_*_amd64.AppImage` or `*_amd64.deb`

            Requires the Claude Code CLI (`claude`) installed and authenticated on `PATH`. Desktop
            builds are **unsigned** — Windows SmartScreen / macOS Gatekeeper may warn (on macOS,
            right-click → Open, or `xattr -cr` the app). For stable versions see the tagged releases.
