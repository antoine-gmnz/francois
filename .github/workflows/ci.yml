name: ci

# Run the test suite on every push to main and every pull request.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest # matches the release target; Tauri compiles with zero extra setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (src-tauri/target)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend typecheck + build
        run: npm run build # tsc --noEmit (strict) + vite build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
